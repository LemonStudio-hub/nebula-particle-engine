<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Nebula Particle Engine - Lightweight high-quality particle engine with WebGPU/WebGL dual backend">
  <meta name="keywords" content="particle engine, WebGPU, WebGL, Three.js, TypeScript, Vue.js, 3D graphics, GPU acceleration">
  <meta name="author" content="Lemon Studio">
  <meta name="theme-color" content="#000000">
  
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="Nebula Particle Engine">
  <meta property="og:description" content="Lightweight high-quality particle engine with WebGPU/WebGL dual backend. 100K+ particles at 60 FPS.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nebula.lemonstudio.dev">
  <meta property="og:image" content="/og-image.png">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Nebula Particle Engine">
  <meta name="twitter:description" content="Lightweight high-quality particle engine with WebGPU/WebGL dual backend. 100K+ particles at 60 FPS.">
  <meta name="twitter:image" content="/og-image.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#8B5CF6">
  
  <title>Nebula Particle Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    /* Loading indicator */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #8B5CF6;
      font-family: Arial, sans-serif;
      font-size: 16px;
      z-index: 9999;
    }
    #loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div id="loading">Loading Nebula</div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
